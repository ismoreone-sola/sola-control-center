<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素辦公室 - Sola Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --accent-grad: linear-gradient(135deg, #ff6b6b 0%, #ffa502 100%);
            --main-accent: #00d2ff;
            --text: #e8e8e8;
            --text-muted: #6b6b7b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(0,210,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(255,165,2,0.04) 0%, transparent 50%);
        }
        
        header {
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-size: 1em;
            font-weight: 300;
            color: #fff;
            letter-spacing: 6px;
        }
        
        .logo span {
            font-weight: 700;
            background: var(--accent-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: inherit;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text);
        }
        
        main {
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .page-title {
            font-size: 1.4em;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .page-desc {
            font-size: 0.85em;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .open-btn {
            display: block;
            background: var(--main-accent);
            color: #000;
            border: none;
            padding: 16px 32px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            font-family: inherit;
            letter-spacing: 2px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        
        .open-btn:hover {
            background: #00b8e6;
            transform: translateY(-2px);
        }
        
        .info-box {
            margin-top: 30px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        
        .info-box h4 {
            font-size: 0.9em;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 12px;
        }
        
        .info-box p {
            font-size: 0.8em;
            color: var(--text-muted);
            line-height: 1.7;
            font-weight: 300;
        }
        
        .footer-home {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        
        .footer-home a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8em;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        
        .footer-home a:hover {
            color: var(--main-accent);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SOLA <span>STUDIO</span></div>
        <a href="index.html" class="back-btn">← 返回</a>
    </header>

    <main>
        <h1 class="page-title">像素辦公室</h1>
        <p class="page-desc">AI 團隊工作狀態看板，即時查看協作狀態與進度。</p>
        
        <a href="./public/star-office/index.html" class="open-btn">
            開啟像素辦公室 →
        </a>
        
        <div class="info-box">
            <h4>關於像素辦公室</h4>
            <p>即時可視化 AI 工作狀態的協作看板，支援多種狀態顯示、團隊成員在線情況、以及昨日工作小記。需要後端服務支援運行。</p>
        </div>
        
        <div class="footer-home">
            <a href="index.html">← 返回目錄</a>
        </div>
    </main>
</body>
</html>
