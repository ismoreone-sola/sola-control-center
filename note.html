<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sola 記事本 - Sola Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --accent: #ff6b6b;
            --accent-grad: linear-gradient(135deg, #ff6b6b 0%, #ffa502 100%);
            --text: #e8e8e8;
            --text-muted: #6b6b7b;
            --note-accent: #00d2ff;
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(ellipse at 80% 0%, rgba(0,210,255,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 100%, rgba(255,107,107,0.04) 0%, transparent 50%);
        }
        
        /* Header */
        header {
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 1em;
            font-weight: 300;
            color: #fff;
            letter-spacing: 6px;
        }
        
        .logo span {
            font-weight: 700;
            background: var(--accent-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: inherit;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text);
        }
        
        /* Main */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 30px 40px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Note App Area */
        .note-area {
            background: var(--bg-gradient);
            background-attachment: fixed;
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
        }
        
        .note-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .note-header h1 {
            font-weight: 200;
            font-size: 1.6em;
            letter-spacing: 14px;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .note-header p {
            font-size: 0.5em;
            letter-spacing: 8px;
            opacity: 0.5;
            color: #fff;
        }
        
        /* Record Button - Original Style */
        .record-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }
        
        #recordBtn {
            background: #fff;
            color: #203a43;
            border: none;
            width: 140px;
            height: 140px;
            border-radius: 70px;
            font-size: 1.2em;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 2px;
        }
        
        #recordBtn:active { transform: scale(0.95); }
        
        #recordBtn.recording {
            background: #ff4757;
            color: #fff;
            box-shadow: 0 0 40px rgba(255,71,87,0.5);
        }
        
        #timer {
            margin-top: 20px;
            font-size: 1.8em;
            font-weight: 200;
            color: var(--note-accent);
            letter-spacing: 2px;
        }
        
        /* Notes List */
        .notes-label {
            font-size: 0.65em;
            letter-spacing: 3px;
            opacity: 0.5;
            color: #fff;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        
        #noteLog {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .note {
            background: rgba(255,255,255,0.95);
            color: #2c3e50;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 10px;
            border-left: 4px solid var(--note-accent);
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .note-time {
            display: block;
            font-size: 0.7em;
            font-weight: 800;
            color: #95a5a6;
            margin-bottom: 4px;
        }
        
        .note-text {
            font-size: 0.95em;
            line-height: 1.5;
            font-weight: 500;
        }
        
        .empty-state {
            opacity: 0.2;
            text-align: center;
            padding: 30px;
            color: #fff;
            font-size: 0.8em;
            letter-spacing: 2px;
        }
        
        #clearBtn {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75em;
            letter-spacing: 2px;
            font-family: inherit;
            transition: all 0.2s;
            width: 100%;
        }
        
        #clearBtn:hover {
            background: rgba(255,71,87,0.15);
            color: #ff6b6b;
        }
        
        /* Footer Info */
        .info-section {
            margin-top: 25px;
            padding: 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
        }
        
        .info-section p {
            font-size: 0.75em;
            color: var(--text-muted);
            line-height: 1.7;
            font-weight: 300;
            text-align: center;
        }
        
        .info-section ul {
            list-style: none;
            margin-top: 12px;
        }
        
        .info-section li {
            font-size: 0.7em;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 300;
        }
        
        .footer-home {
            text-align: center;
            margin-top: 20px;
        }
        
        .footer-home a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8em;
            letter-spacing: 1px;
        }
        
        .footer-home a:hover { color: var(--accent); }
        
        /* Mobile */
        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            main { padding: 15px 20px 30px; }
            .note-area { padding: 30px 20px; }
            #recordBtn { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SOLA <span>STUDIO</span></div>
        <a href="index.html" class="back-btn">← 返回</a>
    </header>

    <main>
        <div class="note-area">
            <div class="note-header">
                <h1>SOLA</h1>
                <p>RAPID NOTEBOOK</p>
            </div>
            
            <div class="record-container">
                <button id="recordBtn">START</button>
                <div id="timer">READY</div>
            </div>
            
            <div class="notes-label">Recent Archives</div>
            <div id="noteLog"></div>
            <button id="clearBtn">清除記錄</button>
        </div>
        
        <div class="info-section">
            <p>生活中的靈感與瑣事都值得被即時捕捉。支援廣東話錄音，資料僅存於本地瀏覽器。</p>
            <ul>
                <li>⚡ 5 秒極速錄音轉文字</li>
                <li>📱 支援加入主畫面即用</li>
                <li>🔒 隱私保護，資料不經伺服器</li>
            </ul>
        </div>
        
        <div class="footer-home">
            <a href="index.html">← 返回目錄</a>
        </div>
    </main>

    <script>
        const noteBtn = document.getElementById('recordBtn');
        const noteClearBtn = document.getElementById('clearBtn');
        const noteTimer = document.getElementById('timer');
        const noteLog = document.getElementById('noteLog');
        
        // Load notes from localStorage
        let notes = JSON.parse(localStorage.getItem('sola_rapid_data') || '[]');
        let currentTranscript = "";
        
        function renderNotes() {
            if(notes.length === 0) {
                noteLog.innerHTML = '<div class="empty-state">LIST IS EMPTY</div>';
                noteClearBtn.style.display = 'none';
                return;
            }
            noteClearBtn.style.display = 'block';
            noteLog.innerHTML = notes.map(n => `
                <div class="note">
                    <span class="note-time">${n.time}</span>
                    <div class="note-text">${n.text}</div>
                </div>
            `).join('');
        }
        
        function saveNote(text) {
            if(!text || text.trim() === "") return;
            
            const now = new Date();
            const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            // Add new note at the beginning
            notes.unshift({ time: timeStr, text: text });
            
            // Keep only 50 notes (remove oldest)
            if(notes.length > 50) {
                notes = notes.slice(0, 50);
            }
            
            localStorage.setItem('sola_rapid_data', JSON.stringify(notes));
            renderNotes();
            currentTranscript = "";
        }

        // Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recog = new SpeechRecognition();
            recog.lang = 'zh-HK';
            recog.interimResults = true;
            recog.continuous = false;

            let clock;
            let recordingSeconds = 5;

            function startRecording() {
                try {
                    noteBtn.classList.add('recording');
                    noteBtn.innerText = 'REC';
                    currentTranscript = "";
                    
                    recordingSeconds = 5.0;
                    noteTimer.innerText = recordingSeconds.toFixed(1) + "S";
                    
                    // Countdown timer
                    clock = setInterval(() => {
                        recordingSeconds -= 0.1;
                        noteTimer.innerText = Math.max(0, recordingSeconds).toFixed(1) + "S";
                        if (recordingSeconds <= 0) {
                            clearInterval(clock);
                            try { recog.stop(); } catch(e) {}
                        }
                    }, 100);
                    
                    recog.start();
                } catch(e) {
                    console.error('Start error:', e);
                    stopRecording();
                }
            }

            function stopRecording() {
                clearInterval(clock);
                noteBtn.classList.remove('recording');
                noteBtn.innerText = 'START';
                noteTimer.innerText = 'SAVED';
                
                // Save the recorded text
                if (currentTranscript && currentTranscript.trim()) {
                    saveNote(currentTranscript);
                }
                
                setTimeout(() => { 
                    if(noteTimer.innerText === 'SAVED') noteTimer.innerText = 'READY'; 
                }, 2000);
            }

            // When recognition returns result
            recog.onresult = function(event) {
                let finalTranscript = '';
                for (let i = event.results.length - 1; i >= 0; i--) {
                    if (event.results[i].isFinal) {
                        finalTranscript = event.results[i][0].transcript;
                        break;
                    }
                }
                if (finalTranscript) {
                    currentTranscript = finalTranscript;
                } else {
                    // Use interim results
                    currentTranscript = event.results[0][0].transcript;
                }
            };

            // When recognition ends
            recog.onend = function() {
                stopRecording();
            };

            recog.onerror = function(event) {
                console.error('Recognition error:', event.error);
                stopRecording();
                noteTimer.innerText = 'ERROR';
                setTimeout(() => { noteTimer.innerText = 'READY'; }, 2000);
            };

            // Button click
            noteBtn.onclick = function() {
                if (!noteBtn.classList.contains('recording')) {
                    startRecording();
                }
            };

            // Clear button
            noteClearBtn.onclick = function() {
                if(confirm('確定要清除所有記錄嗎？')) {
                    notes = [];
                    localStorage.setItem('sola_rapid_data', JSON.stringify(notes));
                    renderNotes();
                }
            };
        } else {
            noteTimer.innerText = "NOT SUPPORTED";
            noteBtn.disabled = true;
            noteBtn.style.opacity = 0.5;
        }
        
        // Initial render
        renderNotes();
    </script>
</body>
</html>
