<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sola 記事本 - Sola Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --accent: #ff6b6b;
            --accent-grad: linear-gradient(135deg, #ff6b6b 0%, #ffa502 100%);
            --text: #e8e8e8;
            --text-muted: #6b6b7b;
            --note-accent: #00d2ff;
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(ellipse at 80% 0%, rgba(0,210,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 20% 100%, rgba(255,107,107,0.04) 0%, transparent 50%);
        }
        
        /* Header */
        header {
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 1em;
            font-weight: 300;
            color: #fff;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        
        .logo span {
            font-weight: 700;
            background: var(--accent-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: inherit;
            letter-spacing: 1px;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.06);
            color: var(--text);
        }
        
        /* Main */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Note App */
        .note-app {
            background: var(--bg-gradient);
            background-attachment: fixed;
            border-radius: 28px;
            padding: 40px 30px;
            width: 100%;
            min-height: calc(100vh - 160px);
        }
        
        .note-app header {
            background: none;
            border: none;
            padding: 0;
            margin-bottom: 30px;
            position: static;
        }
        
        .note-app header h1 {
            font-weight: 200;
            letter-spacing: 14px;
            margin-bottom: 5px;
            color: #fff;
            text-align: center;
            font-size: 1.8em;
        }
        
        .note-app header p {
            font-size: 0.55em;
            letter-spacing: 8px;
            opacity: 0.5;
            color: #fff;
            text-align: center;
        }
        
        .main-btn-area {
            background: rgba(255,255,255,0.05);
            padding: 50px 20px;
            border-radius: 50%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 30px;
            text-align: center;
            width: 200px;
            height: 200px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #recordBtn {
            background: #fff;
            color: #203a43;
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 2px;
        }
        
        #recordBtn:active { transform: scale(0.95); }
        
        #recordBtn.recording { 
            background: #ff4757; 
            color: #fff; 
            box-shadow: 0 0 50px rgba(255,71,87,0.5);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        
        #timer { 
            margin-top: 15px; 
            font-size: 1.5em; 
            font-weight: 300; 
            color: var(--note-accent);
            letter-spacing: 2px;
        }
        
        .ledger-label { 
            text-align: left; 
            font-size: 0.7em; 
            letter-spacing: 3px; 
            opacity: 0.5; 
            margin: 25px 0 15px; 
            text-transform: uppercase; 
            color: #fff;
        }
        
        #noteLog { text-align: left; }
        
        .note {
            background: rgba(255,255,255,0.95);
            color: #2c3e50;
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 10px;
            border-left: 4px solid var(--note-accent);
            animation: noteFadeIn 0.3s ease-out;
        }
        
        @keyframes noteFadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .note-time { 
            display: block; 
            font-size: 0.7em; 
            font-weight: 700; 
            color: #95a5a6; 
            margin-bottom: 4px; 
        }
        
        .note-text { 
            font-size: 0.95em; 
            line-height: 1.5; 
            font-weight: 500; 
        }
        
        #clearBtn {
            margin-top: 25px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.75em;
            letter-spacing: 2px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        #clearBtn:hover {
            background: rgba(255,71,87,0.15);
            color: #ff6b6b;
            border-color: rgba(255,71,87,0.2);
        }
        
        .empty-state { 
            opacity: 0.25; 
            text-align: center; 
            padding: 30px 0; 
            color: #fff;
            font-size: 0.85em;
            letter-spacing: 2px;
        }
        
        /* Footer */
        footer {
            padding: 30px 20px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }
        
        .footer-section {
            margin-bottom: 20px;
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        
        .footer-section h3 {
            font-size: 0.9em;
            font-weight: 500;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        
        .footer-section p {
            font-size: 0.8em;
            color: var(--text-muted);
            line-height: 1.7;
            font-weight: 300;
        }
        
        .footer-section ul {
            padding-left: 18px;
            margin: 10px 0;
        }
        
        .footer-section ul li {
            font-size: 0.8em;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 300;
        }
        
        .footer-privacy {
            background: rgba(63, 185, 80, 0.08);
            border: 1px solid rgba(63, 185, 80, 0.15);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.75em;
            color: #3fb950;
            text-align: center;
            font-weight: 400;
        }
        
        .footer-home {
            text-align: center;
            margin-top: 15px;
        }
        
        .footer-home a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8em;
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        
        .footer-home a:hover { color: var(--accent); }
        
        /* Mobile */
        @media (max-width: 600px) {
            header { padding: 15px 20px; }
            .logo { font-size: 0.9em; letter-spacing: 4px; }
            .note-app { padding: 30px 20px; }
            .main-btn-area { width: 170px; height: 170px; }
            #recordBtn { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SOLA <span>STUDIO</span></div>
        <a href="index.html" class="back-btn">← 返回</a>
    </header>

    <main>
        <div class="note-app">
            <header>
                <h1>SOLA</h1>
                <p>RAPID NOTEBOOK</p>
            </header>
            
            <div class="main-btn-area">
                <button id="recordBtn">START</button>
                <div id="timer">READY</div>
            </div>
            
            <div class="ledger-label">Recent Archives</div>
            <div id="noteLog"></div>
            <button id="clearBtn">清除記錄</button>
        </div>
    </main>

    <footer>
        <div class="footer-section">
            <h3>關於 Sola 記事本</h3>
            <p>生活中的靈感與瑣事都值得被即時捕捉。</p>
        </div>
        
        <div class="footer-section">
            <ul>
                <li>⚡ 極速記錄：5 秒內完成錄音轉文字</li>
                <li>🎤 即說即記：一鍵開啟錄音</li>
                <li>📱 隨手可用：支援加入主畫面</li>
            </ul>
        </div>

        <div class="footer-privacy">
            🔒 隱私保護：資料僅存於本地瀏覽器
        </div>
        
        <div class="footer-home">
            <a href="index.html">← 返回首頁</a>
        </div>
    </footer>

    <script>
        const noteBtn = document.getElementById('recordBtn');
        const noteClearBtn = document.getElementById('clearBtn');
        const noteTimer = document.getElementById('timer');
        const noteLog = document.getElementById('noteLog');
        
        let notes = JSON.parse(localStorage.getItem('sola_rapid_data') || '[]');
        let currentTranscript = "";
        let isRecording = false;
        
        function renderNotes() {
            if(notes.length === 0) {
                noteLog.innerHTML = '<div class="empty-state">LIST IS EMPTY</div>';
                noteClearBtn.style.display = 'none';
                return;
            }
            noteClearBtn.style.display = 'inline-block';
            noteLog.innerHTML = notes.map(n => `
                <div class="note">
                    <span class="note-time">${n.time}</span>
                    <div class="note-text">${n.text}</div>
                </div>
            `).join('');
        }
        renderNotes();

        function saveNote(text) {
            if(!text || text.trim() === "") return;
            const now = new Date();
            const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            notes.unshift({ time: timeStr, text: text });
            if(notes.length > 50) notes.pop();
            localStorage.setItem('sola_rapid_data', JSON.stringify(notes));
            renderNotes();
            currentTranscript = "";
        }

        // Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recog = new SpeechRecognition();
            recog.lang = 'zh-HK';
            recog.interimResults = true;
            recog.continuous = false;

            let clock;
            let recordingTime = 5;

            function startRecording() {
                try {
                    isRecording = true;
                    noteBtn.classList.add('recording');
                    noteBtn.innerText = 'REC';
                    currentTranscript = "";
                    
                    recordingTime = 5.0;
                    noteTimer.innerText = recordingTime.toFixed(1) + "S";
                    
                    clock = setInterval(() => {
                        recordingTime -= 0.1;
                        noteTimer.innerText = Math.max(0, recordingTime).toFixed(1) + "S";
                        if (recordingTime <= 0) {
                            clearInterval(clock);
                            try { recog.stop(); } catch(e) {}
                        }
                    }, 100);
                    
                    recog.start();
                } catch(e) {
                    console.error('Recognition start error:', e);
                    stopRecording();
                }
            }

            function stopRecording() {
                isRecording = false;
                clearInterval(clock);
                noteBtn.classList.remove('recording');
                noteBtn.innerText = 'START';
                noteTimer.innerText = 'SAVED';
                
                if (currentTranscript.trim()) {
                    saveNote(currentTranscript);
                }
                
                setTimeout(() => { 
                    if(noteTimer.innerText === 'SAVED') noteTimer.innerText = 'READY'; 
                }, 2000);
            }

            recog.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                if (event.results[0].isFinal) {
                    currentTranscript = transcript;
                }
            };

            recog.onend = () => {
                stopRecording();
            };

            recog.onerror = (event) => {
                console.error('Recognition error:', event.error);
                stopRecording();
                noteTimer.innerText = 'ERROR';
                setTimeout(() => { noteTimer.innerText = 'READY'; }, 2000);
            };

            noteBtn.onclick = () => {
                if (!isRecording) {
                    startRecording();
                }
            };

            noteClearBtn.onclick = () => {
                if(confirm('確定要清除所有記錄嗎？')) {
                    notes = [];
                    localStorage.setItem('sola_rapid_data', JSON.stringify(notes));
                    renderNotes();
                }
            };
        } else {
            noteTimer.innerText = "NOT SUPPORTED";
            noteBtn.disabled = true;
            noteBtn.style.opacity = 0.5;
        }
    </script>
</body>
</html>
