<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sola Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --accent: #ff6b6b;
            --accent-grad: linear-gradient(135deg, #ff6b6b 0%, #ffa502 100%);
            --text: #e8e8e8;
            --text-muted: #6b6b7b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(255,107,107,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(255,165,2,0.06) 0%, transparent 50%);
        }
        
        /* Header */
        header {
            padding: 30px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 1.6em;
            font-weight: 300;
            color: #fff;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        
        .logo span {
            font-weight: 700;
            background: var(--accent-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Nav */
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9em;
            font-weight: 400;
            letter-spacing: 2px;
            padding: 10px 20px;
            transition: color 0.3s;
        }
        
        .nav-link:hover { color: var(--text); }
        
        /* Main */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        
        /* Hero */
        .hero {
            margin-bottom: 80px;
            animation: fadeUp 0.8s ease;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .hero h1 {
            font-size: 4em;
            font-weight: 300;
            color: #fff;
            letter-spacing: 20px;
            margin-bottom: 20px;
        }
        
        .hero h1 span {
            font-weight: 700;
        }
        
        .hero p {
            font-size: 1em;
            color: var(--text-muted);
            letter-spacing: 4px;
            font-weight: 300;
        }
        
        /* Tools */
        .tools {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            animation: fadeUp 0.8s ease 0.2s both;
        }
        
        .tool-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
            min-width: 240px;
        }
        
        .tool-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-8px);
            border-color: rgba(255,107,107,0.3);
        }
        
        .tool-icon {
            font-size: 2.5em;
            margin-bottom: 16px;
            display: block;
        }
        
        .tool-card h3 {
            font-size: 1.1em;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        
        .tool-card p {
            font-size: 0.8em;
            color: var(--text-muted);
            line-height: 1.6;
            font-weight: 300;
        }
        
        /* Status */
        .status {
            margin-top: 80px;
            font-size: 0.75em;
            color: var(--text-muted);
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeUp 0.8s ease 0.4s both;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3fb950;
        }
        
        /* Footer */
        footer {
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7em;
            letter-spacing: 2px;
            opacity: 0.5;
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            header { padding: 20px; }
            .logo { font-size: 1.2em; letter-spacing: 4px; }
            main { padding: 20px; }
            .hero h1 { font-size: 2.2em; letter-spacing: 10px; }
            .tools { gap: 20px; }
            .tool-card { padding: 30px; min-width: 160px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SOLA <span>STUDIO</span></div>
        <a href="note.html" class="nav-link">NOTE</a>
    </header>

    <main>
        <div class="hero">
            <h1>歡迎回來</h1>
            <p>選擇一個工具開始使用</p>
        </div>

        <div class="tools">
            <a href="note.html" class="tool-card">
                <span class="tool-icon">📝</span>
                <h3>記事本</h3>
                <p>語音即時記錄<br>捕捉每個靈感瞬間</p>
            </a>
            <div class="tool-card">
                <span class="tool-icon">🏢</span>
                <h3>辦公室</h3>
                <p>AI 工作狀態看板<br>需後端服務支援</p>
            </div>
        </div>

        <div class="status">
            <div class="status-dot"></div>
            <span>系統正常運作</span>
            <span>·</span>
            <span>v2.0</span>
        </div>
    </main>

    <footer>
        SOLA STUDIO © 2026
    </footer>
</body>
</html>
