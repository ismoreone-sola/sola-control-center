<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sola Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --accent: #ff6b6b;
            --accent-grad: linear-gradient(135deg, #ff6b6b 0%, #ffa502 100%);
            --main-accent: #00d2ff;
            --main-accent-dim: rgba(0, 210, 255, 0.15);
            --text: #e8e8e8;
            --text-muted: #6b6b7b;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(0,210,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(255,165,2,0.04) 0%, transparent 50%);
        }
        
        /* Header */
        header {
            padding: 30px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            font-size: 1.4em;
            font-weight: 300;
            color: #fff;
            letter-spacing: 8px;
        }
        
        .logo span {
            font-weight: 700;
            background: var(--accent-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 400;
            letter-spacing: 2px;
            padding: 10px 20px;
            transition: color 0.3s;
        }
        
        .nav-link:hover { 
            color: var(--main-accent);
        }
        
        /* Main */
        main {
            padding: 40px 40px 80px;
            max-width: 800px;
        }
        
        .directory {
            list-style: none;
        }
        
        .directory-item {
            padding: 25px 0;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s;
        }
        
        .directory-item:last-child {
            border-bottom: none;
        }
        
        .directory-item a {
            display: block;
            text-decoration: none;
            color: inherit;
        }
        
        .directory-item:hover .item-name {
            color: var(--main-accent);
        }
        
        .item-name {
            font-size: 1.1em;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        
        .item-desc {
            font-size: 0.8em;
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.6;
        }
        
        .item-status {
            display: inline-block;
            font-size: 0.65em;
            color: var(--text-muted);
            margin-top: 8px;
            padding: 3px 10px;
            border: 1px solid var(--border);
            border-radius: 20px;
            letter-spacing: 1px;
        }
        
        .item-status.local {
            color: #5a9e8a;
            border-color: rgba(90,158,138,0.3);
        }
        
        .item-status.remote {
            color: #7b6e8e;
            border-color: rgba(123,110,142,0.3);
        }
        
        /* Footer */
        footer {
            padding: 30px 40px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.7em;
            color: var(--text-muted);
            letter-spacing: 1px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #3fb950;
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            header { padding: 20px; }
            main { padding: 30px 20px 60px; }
            footer { padding: 20px; flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SOLA <span>STUDIO</span></div>
        <a href="note.html" class="nav-link">NOTE</a>
    </header>

    <main>
        <ul class="directory">
            <li class="directory-item">
                <a href="note.html">
                    <div class="item-name">Sola 記事本</div>
                    <div class="item-desc">語音即時記錄，捕捉每個靈感瞬間。支援廣東話錄音，資料儲存於本地瀏覽器。</div>
                    <span class="item-status local">本地運行</span>
                </a>
            </li>
            <li class="directory-item">
                <a href="office.html">
                    <div class="item-name">像素辦公室</div>
                    <div class="item-desc">AI 工作狀態看板，即時查看 AI 團隊協作狀態與進度。</div>
                    <span class="item-status remote">需後端服務</span>
                </a>
            </li>
        </ul>
    </main>

    <footer>
        <div class="status">
            <div class="status-dot"></div>
            <span>系統正常運作</span>
        </div>
        <div>v2.0</div>
    </footer>
</body>
</html>
