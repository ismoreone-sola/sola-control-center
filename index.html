<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sola Control Center</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --note-accent: #00d2ff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.3em;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #ff6b6b, #ffa502);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        /* Nav */
        nav { display: flex; gap: 4px; }
        
        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-btn.active { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
        .nav-icon { font-size: 1.1em; }
        
        /* Main */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Views */
        .tool-view { display: none; flex: 1; flex-direction: column; animation: fadeIn 0.3s ease; }
        .tool-view.active { display: flex; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .tool-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .tool-title { font-size: 1.4em; font-weight: 600; color: #fff; }
        .tool-desc { color: var(--text-muted); font-size: 0.9em; }
        
        /* Quick Grid */
        .quick-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; padding: 20px 0; }
        
        .quick-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .quick-card-icon { font-size: 2.5em; margin-bottom: 12px; }
        .quick-card h3 { font-size: 1.1em; margin-bottom: 8px; color: #fff; }
        .quick-card p { font-size: 0.85em; color: var(--text-muted); line-height: 1.5; }
        
        /* Status Bar */
        .status-bar {
            margin-top: 20px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85em;
            color: var(--text-muted);
        }
        
        .status-item { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; }
        
        /* Iframe Container */
        .iframe-container {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            min-height: 600px;
            position: relative;
        }
        
        .iframe-container iframe {
            width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0;
        }
        
        /* ========== NOTE APP BUILT-IN ========== */
        #view-note {
            background: var(--bg-gradient);
            background-attachment: fixed;
            padding: 20px;
            border-radius: 12px;
        }
        
        .note-app {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            text-align: center;
        }
        
        .note-app header h1 {
            font-weight: 200;
            letter-spacing: 10px;
            margin: 30px 0 5px;
            color: #fff;
        }
        
        .note-app header p {
            font-size: 0.6em;
            letter-spacing: 5px;
            opacity: 0.5;
            margin-bottom: 40px;
            color: #fff;
        }
        
        .main-btn-area {
            background: rgba(255,255,255,0.05);
            padding: 50px 20px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        #recordBtn {
            background: #fff;
            color: #203a43;
            border: none;
            width: 140px;
            height: 140px;
            border-radius: 70px;
            font-size: 1.2em;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        
        #recordBtn:active { transform: scale(0.95); }
        #recordBtn.recording { background: #ff4757; color: #fff; box-shadow: 0 0 40px rgba(255,71,87,0.5); }
        
        #timer { margin-top: 25px; font-size: 2em; font-weight: 200; color: var(--note-accent); }
        
        .ledger-label { text-align: left; font-size: 0.7em; letter-spacing: 3px; opacity: 0.6; margin: 20px 0 15px 10px; text-transform: uppercase; color: #fff; }
        
        #noteLog { text-align: left; }
        
        .note {
            background: rgba(255,255,255,0.95);
            color: #2c3e50;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 12px;
            border-left: 5px solid var(--note-accent);
            animation: noteFadeIn 0.3s ease-out;
        }
        
        @keyframes noteFadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .note-time { display: block; font-size: 0.65em; font-weight: 800; color: #95a5a6; margin-bottom: 6px; }
        .note-text { font-size: 1.05em; line-height: 1.5; font-weight: 500; }
        
        #clearBtn {
            margin-top: 30px;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8em;
            letter-spacing: 2px;
        }
        
        .empty-state { opacity: 0.2; text-align: center; padding-top: 40px; color: #fff; }
        
        /* Mobile */
        @media (max-width: 600px) {
            header { padding: 12px 16px; }
            .nav-btn { padding: 8px 12px; font-size: 0.8em; }
            .nav-btn span { display: none; }
            main { padding: 12px; }
            .iframe-container { min-height: 500px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">🦞</div>
            <span>Sola</span>
        </div>
        <nav>
            <button class="nav-btn active" data-tool="home">
                <span class="nav-icon">🏠</span>
                <span>首頁</span>
            </button>
            <button class="nav-btn" data-tool="office">
                <span class="nav-icon">🏢</span>
                <span>辦公室</span>
            </button>
            <button class="nav-btn" data-tool="note">
                <span class="nav-icon">📝</span>
                <span>記事本</span>
            </button>
        </nav>
    </header>

    <main>
        <!-- Home View -->
        <div id="view-home" class="tool-view active">
            <div class="tool-header">
                <div>
                    <h1 class="tool-title">歡迎回來</h1>
                    <p class="tool-desc">選擇一個工具開始使用</p>
                </div>
            </div>
            <div class="quick-grid">
                <div class="quick-card" onclick="switchTool('office')">
                    <div class="quick-card-icon">🏢</div>
                    <h3>像素辦公室</h3>
                    <p>即時查看 AI 工作狀態，支援多 Agent 協作看板</p>
                </div>
                <div class="quick-card" onclick="switchTool('note')">
                    <div class="quick-card-icon">📝</div>
                    <h3>Sola 記事本</h3>
                    <p>語音即時記錄，捕捉每個靈感瞬間</p>
                </div>
            </div>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot"></div>
                    <span>系統正常運作</span>
                </div>
                <div class="status-item">
                    <span>v1.1.0</span>
                </div>
            </div>
        </div>

        <!-- Office View -->
        <div id="view-office" class="tool-view">
            <div class="tool-header">
                <div>
                    <h1 class="tool-title">🏢 像素辦公室</h1>
                    <p class="tool-desc">AI 團隊狀態看板 · 需後端運行</p>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="frame-office" src=""></iframe>
            </div>
        </div>

        <!-- Note View (BUILT-IN) -->
        <div id="view-note" class="tool-view">
            <div class="note-app">
                <header>
                    <h1>SOLA</h1>
                    <p>RAPID NOTEBOOK</p>
                </header>
                <div class="main-btn-area">
                    <button id="recordBtn">START</button>
                    <div id="timer">READY</div>
                </div>
                <div class="ledger-label">Recent Archives</div>
                <div id="noteLog"></div>
                <button id="clearBtn">訊息清除</button>
            </div>
        </div>
    </main>

    <script>
        // ===== NOTE APP LOGIC =====
        const noteBtn = document.getElementById('recordBtn');
        const noteClearBtn = document.getElementById('clearBtn');
        const noteTimer = document.getElementById('timer');
        const noteLog = document.getElementById('noteLog');
        
        let notes = JSON.parse(localStorage.getItem('sola_rapid_data') || '[]');
        let currentTranscript = "";
        
        function renderNotes() {
            if(notes.length === 0) {
                noteLog.innerHTML = '<div class="empty-state">LIST IS EMPTY</div>';
                noteClearBtn.style.display = 'none';
                return;
            }
            noteClearBtn.style.display = 'inline-block';
            noteLog.innerHTML = notes.map(n => `
                <div class="note">
                    <span class="note-time">${n.time}</span>
                    <div class="note-text">${n.text}</div>
                </div>
            `).join('');
        }
        renderNotes();

        function saveNote(text) {
            if(!text || text.trim() === "") return;
            const now = new Date();
            const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            
            notes.unshift({ time: timeStr, text: text });
            if(notes.length > 50) notes.pop();
            localStorage.setItem('sola_rapid_data', JSON.stringify(notes));
            renderNotes();
            currentTranscript = "";
        }

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Recognition) {
            const recog = new Recognition();
            recog.lang = 'zh-HK';
            recog.interimResults = true;

            let clock;

            recog.onstart = () => {
                noteBtn.classList.add('recording');
                noteBtn.disabled = true;
                noteBtn.innerText = 'REC';
                currentTranscript = "";
                
                let seconds = 5.0;
                noteTimer.innerText = seconds.toFixed(1) + "S";
                
                clock = setInterval(() => {
                    seconds -= 0.1;
                    noteTimer.innerText = Math.max(0, seconds).toFixed(1) + "S";
                    if (seconds <= 0) {
                        clearInterval(clock);
                        recog.stop();
                    }
                }, 100);
            };

            recog.onresult = (e) => {
                currentTranscript = e.results[0][0].transcript;
            };

            recog.onend = () => {
                clearInterval(clock);
                noteBtn.classList.remove('recording');
                noteBtn.disabled = false;
                noteBtn.innerText = 'START';
                noteTimer.innerText = 'SAVED';
                
                saveNote(currentTranscript);
                
                setTimeout(() => { 
                    if(noteTimer.innerText === 'SAVED') noteTimer.innerText = 'READY'; 
                }, 2000);
            };

            recog.onerror = () => {
                clearInterval(clock);
                noteBtn.classList.remove('recording');
                noteBtn.disabled = false;
                noteBtn.innerText = 'START';
                noteTimer.innerText = 'ERROR';
            };

            noteBtn.onclick = () => {
                try { recog.start(); } catch(e) { recog.abort(); }
            };

            noteClearBtn.onclick = () => {
                if(confirm('確定要清除所有記錄嗎？此操作無法還原。')) {
                    notes = [];
                    localStorage.setItem('sola_rapid_data', JSON.stringify(notes));
                    renderNotes();
                }
            };
        } else {
            noteTimer.innerText = "NOT SUPPORTED";
        }

        // ===== NAVIGATION =====
        const TOOL_URLS = {
            office: 'http://127.0.0.1:18791/'
        };
        
        function switchTool(tool) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tool === tool);
            });
            
            document.querySelectorAll('.tool-view').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById('view-' + tool).classList.add('active');
            
            if (tool === 'office') {
                const frame = document.getElementById('frame-office');
                if (!frame.src || frame.src === 'about:blank') {
                    frame.src = TOOL_URLS.office;
                }
            }
        }
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTool(btn.dataset.tool));
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') switchTool('home');
        });
    </script>
</body>
</html>
