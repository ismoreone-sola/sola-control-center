<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sola Control Center</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --text: #c9d1d9;
            --text-muted: #8b949e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            font-size: 1.3em;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #ff6b6b, #ffa502);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        /* Nav */
        nav {
            display: flex;
            gap: 4px;
        }
        
        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .nav-btn:hover {
            background: rgba(255,255,255,0.05);
            color: var(--text);
        }
        
        .nav-btn.active {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
        }
        
        .nav-icon {
            font-size: 1.1em;
        }
        
        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Tool View */
        .tool-view {
            display: none;
            flex: 1;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        
        .tool-view.active {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .tool-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .tool-title {
            font-size: 1.4em;
            font-weight: 600;
            color: #fff;
        }
        
        .tool-desc {
            color: var(--text-muted);
            font-size: 0.9em;
        }
        
        /* Iframe Container */
        .iframe-container {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            min-height: 600px;
            position: relative;
        }
        
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        /* Status Bar */
        .status-bar {
            margin-top: 20px;
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.85em;
            color: var(--text-muted);
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #3fb950;
        }
        
        /* Quick Grid (Home) */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            padding: 20px 0;
        }
        
        .quick-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .quick-card-icon {
            font-size: 2.5em;
            margin-bottom: 12px;
        }
        
        .quick-card h3 {
            font-size: 1.1em;
            margin-bottom: 8px;
            color: #fff;
        }
        
        .quick-card p {
            font-size: 0.85em;
            color: var(--text-muted);
            line-height: 1.5;
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            header { padding: 12px 16px; }
            .nav-btn { padding: 8px 12px; font-size: 0.8em; }
            .nav-btn span { display: none; }
            main { padding: 12px; }
            .iframe-container { min-height: 500px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">🦞</div>
            <span>Sola</span>
        </div>
        <nav>
            <button class="nav-btn active" data-tool="home">
                <span class="nav-icon">🏠</span>
                <span>首頁</span>
            </button>
            <button class="nav-btn" data-tool="office">
                <span class="nav-icon">🏢</span>
                <span>辦公室</span>
            </button>
            <button class="nav-btn" data-tool="note">
                <span class="nav-icon">📝</span>
                <span>記事本</span>
            </button>
        </nav>
    </header>

    <main>
        <!-- Home View -->
        <div id="view-home" class="tool-view active">
            <div class="tool-header">
                <div>
                    <h1 class="tool-title">歡迎回來</h1>
                    <p class="tool-desc">選擇一個工具開始使用</p>
                </div>
            </div>
            <div class="quick-grid">
                <div class="quick-card" onclick="switchTool('office')">
                    <div class="quick-card-icon">🏢</div>
                    <h3>像素辦公室</h3>
                    <p>即時查看 AI 工作狀態，支援多 Agent 協作看板</p>
                </div>
                <div class="quick-card" onclick="switchTool('note')">
                    <div class="quick-card-icon">📝</div>
                    <h3>Sola 記事本</h3>
                    <p>語音即時記錄，捕捉每個靈感瞬間</p>
                </div>
            </div>
            <div class="status-bar">
                <div class="status-item">
                    <div class="status-dot"></div>
                    <span>系統正常運作</span>
                </div>
                <div class="status-item">
                    <span>v1.0.0</span>
                </div>
            </div>
        </div>

        <!-- Office View -->
        <div id="view-office" class="tool-view">
            <div class="tool-header">
                <div>
                    <h1 class="tool-title">🏢 像素辦公室</h1>
                    <p class="tool-desc">AI 團隊狀態看板 · 端口 18791</p>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="frame-office" src="" style="display:none"></iframe>
            </div>
        </div>

        <!-- Note View -->
        <div id="view-note" class="tool-view">
            <div class="tool-header">
                <div>
                    <h1 class="tool-title">📝 Sola 記事本</h1>
                    <p class="tool-desc">語音快速記錄工具</p>
                </div>
            </div>
            <div class="iframe-container">
                <iframe id="frame-note" src="" style="display:none"></iframe>
            </div>
        </div>
    </main>

    <script>
        // Tool URLs - 根據實際部署位置調整
        const TOOL_URLS = {
            office: 'http://127.0.0.1:18791/',
            note: './sola-note/index.html'
        };
        
        let currentTool = 'home';
        
        function switchTool(tool) {
            // Update nav
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tool === tool);
            });
            
            // Update view
            document.querySelectorAll('.tool-view').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById('view-' + tool).classList.add('active');
            
            // Load iframe if needed
            if (tool !== 'home') {
                const frame = document.getElementById('frame-' + tool);
                if (!frame.src || frame.src === 'about:blank') {
                    frame.src = TOOL_URLS[tool];
                    frame.style.display = 'block';
                }
            }
            
            currentTool = tool;
        }
        
        // Nav click handlers
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTool(btn.dataset.tool));
        });
        
        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') switchTool('home');
            if (e.key === '1' && e.altKey) switchTool('home');
            if (e.key === '2' && e.altKey) switchTool('office');
            if (e.key === '3' && e.altKey) switchTool('note');
        });
    </script>
</body>
</html>
